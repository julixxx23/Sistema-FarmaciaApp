spring:
  application:
    name: "AppOchoa"

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: "AppOchoa"
      environment: "production"

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnly}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    farmacias.AppOchoa: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

springdoc:
  packages-to-scan: farmacias.AppOchoa
  paths-to-match: /**

# Loki - expone las variables de entorno a logback-spring.xml
loki:
  url: ${LOKI_URL:https://logs-prod-042.grafana.net/loki/api/v1/push}
  username: ${LOKI_USERNAME:1499882}
  password: ${LOKI_PASSWORD:}