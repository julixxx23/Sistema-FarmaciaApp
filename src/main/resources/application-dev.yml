
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics,env,beans,mappings,loggers"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    farmacias.AppOchoa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true