spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    #pool de conexiones
    hikari:
      # máximo 10 conexiones abiertas al mismo tiempo
      maximum-pool-size: 10
      # mínimo 5 conexiones siempre listas aunque no haya tráfico
      minimum-idle: 5
      # si no hay conexión disponible, espera 20 segundos antes de lanzar error
      connection-timeout: 20000
      # una conexión inactiva se cierra después de 5 minutos
      idle-timeout: 300000
      # una conexión vive máximo 20 minutos, luego se recrea
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8080

#Configuración JWT
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnly}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    farmacias.AppOchoa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  packages-to-scan: farmacias.AppOchoa
  paths-to-match: /**